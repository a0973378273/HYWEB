<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Board - 天氣預報 App</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    line-height: 1.6;
    padding: 20px;
    max-width: 960px;
    margin: 0 auto;
  }
  h1 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #e6edf3;
  }
  .subtitle {
    font-size: 14px;
    color: #8b949e;
    margin-bottom: 24px;
  }
  .progress-bar-container {
    background: #21262d;
    border-radius: 6px;
    height: 8px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: #238636;
    border-radius: 6px;
    transition: width 0.3s ease;
  }
  .progress-text {
    font-size: 13px;
    color: #8b949e;
    margin-bottom: 8px;
  }
  .section {
    margin-bottom: 24px;
    border: 1px solid #30363d;
    border-radius: 6px;
    overflow: hidden;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    cursor: pointer;
    user-select: none;
  }
  .section-header:hover { background: #1c2128; }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-count {
    font-size: 12px;
    background: #30363d;
    color: #8b949e;
    padding: 1px 8px;
    border-radius: 10px;
  }
  .section-toggle {
    font-size: 12px;
    color: #8b949e;
    transition: transform 0.2s;
  }
  .section.collapsed .section-toggle { transform: rotate(-90deg); }
  .section.collapsed .task-list { display: none; }
  .dot-todo { color: #f0883e; }
  .dot-progress { color: #1f6feb; }
  .dot-done { color: #238636; }
  .task-list { list-style: none; }
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid #21262d;
    transition: background 0.15s;
  }
  .task-item:last-child { border-bottom: none; }
  .task-item:hover { background: #161b22; }
  .task-item.completed .task-text {
    text-decoration: line-through;
    color: #8b949e;
  }
  .task-checkbox {
    appearance: none;
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    min-width: 18px;
    border: 2px solid #30363d;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 2px;
    position: relative;
    transition: all 0.15s;
  }
  .task-checkbox:hover { border-color: #58a6ff; }
  .task-checkbox:checked {
    background: #238636;
    border-color: #238636;
  }
  .task-checkbox:checked::after {
    content: '';
    position: absolute;
    top: 1px;
    left: 5px;
    width: 4px;
    height: 8px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .task-text { font-size: 14px; flex: 1; }
  .task-id {
    font-weight: 600;
    color: #58a6ff;
    margin-right: 4px;
  }
  .meta {
    font-size: 12px;
    color: #8b949e;
    margin-top: 4px;
  }
  .empty-state {
    padding: 24px 16px;
    text-align: center;
    color: #484f58;
    font-size: 14px;
  }
  .project-info {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 24px;
    font-size: 13px;
    color: #8b949e;
  }
  .project-info strong { color: #e6edf3; }
  .tag {
    display: inline-block;
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 10px;
    margin-right: 4px;
    margin-top: 4px;
  }
  .tag-tech { background: #1f3a5c; color: #58a6ff; }
  @media (max-width: 600px) {
    body { padding: 12px; }
    .task-item { padding: 8px 12px; }
    .section-header { padding: 10px 12px; }
  }
</style>
</head>
<body>

<h1>Task Board</h1>
<div class="subtitle">天氣預報 App - 任務看板</div>

<div class="project-info">
  <strong>專案概述</strong>：串接中央氣象署「今明 36 小時天氣預報」API（F-C0032-001），實現城市天氣查詢功能。<br>
  <strong>技術棧</strong>：
  <span class="tag tag-tech">Flutter</span>
  <span class="tag tag-tech">Riverpod 2.0</span>
  <span class="tag tag-tech">Dio</span>
  <span class="tag tag-tech">freezed</span>
  <span class="tag tag-tech">json_serializable</span>
</div>

<div class="progress-text" id="progress-text"></div>
<div class="progress-bar-container">
  <div class="progress-bar" id="progress-bar"></div>
</div>

<div class="section" id="section-todo">
  <div class="section-header" onclick="toggleSection('todo')">
    <span class="section-title"><span class="dot-todo">&#9679;</span> 待辦 <span class="section-count" id="count-todo">0</span></span>
    <span class="section-toggle" id="toggle-todo">&#9660;</span>
  </div>
  <ul class="task-list" id="list-todo"></ul>
</div>

<div class="section" id="section-progress">
  <div class="section-header" onclick="toggleSection('progress')">
    <span class="section-title"><span class="dot-progress">&#9679;</span> 進行中 <span class="section-count" id="count-progress">0</span></span>
    <span class="section-toggle" id="toggle-progress">&#9660;</span>
  </div>
  <ul class="task-list" id="list-progress"></ul>
</div>

<div class="section" id="section-done">
  <div class="section-header" onclick="toggleSection('done')">
    <span class="section-title"><span class="dot-done">&#9679;</span> 已完成 <span class="section-count" id="count-done">0</span></span>
    <span class="section-toggle" id="toggle-done">&#9660;</span>
  </div>
  <ul class="task-list" id="list-done"></ul>
</div>

<script>
const TASKS = [
  { id: "task-1", text: "Flutter 專案建立", section: "done" },
  { id: "task-2", text: "Task 1：專案基礎架構設定", section: "done" },
  { id: "task-3", text: "Task 2：資料層 - API Model 與 Repository", section: "done" },
  { id: "task-4", text: "Task 3：Domain 層 - 天氣資料整理", section: "done" },
  { id: "task-5", text: "Task 4：狀態管理 - Riverpod Provider", section: "done" },
  { id: "task-6", text: "Task 5：UI - 搜尋頁面與四個 Widget", section: "done" },
  { id: "task-7", text: "Task 6：錯誤處理完善（已於 Task 2 Repository 中實作）", section: "done" },
  { id: "task-8", text: "Task 7：UI 美化與使用者體驗", section: "done" },
  { id: "task-9", text: "Task 8：README.md 撰寫", section: "done" },
  { id: "task-10", text: "Task 9：Git 初始化與提交至 GitHub", section: "done" }
];

const STORAGE_KEY = "task-board-maauu";

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : {};
  } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getEffectiveSection(task, state) {
  if (state[task.id] !== undefined) return state[task.id];
  return task.section;
}

function toggleTask(taskId) {
  const state = loadState();
  const task = TASKS.find(t => t.id === taskId);
  const current = getEffectiveSection(task, state);
  state[taskId] = current === "done" ? "todo" : "done";
  saveState(state);
  render();
}

function toggleSection(name) {
  const el = document.getElementById("section-" + name);
  el.classList.toggle("collapsed");
}

function render() {
  const state = loadState();
  const buckets = { todo: [], progress: [], done: [] };

  TASKS.forEach(task => {
    const section = getEffectiveSection(task, state);
    buckets[section].push(task);
  });

  const total = TASKS.length;
  const doneCount = buckets.done.length;

  document.getElementById("progress-text").textContent = doneCount + " / " + total + " tasks done";
  document.getElementById("progress-bar").style.width = (total ? (doneCount / total * 100) : 0) + "%";

  ["todo", "progress", "done"].forEach(section => {
    const list = document.getElementById("list-" + section);
    const count = document.getElementById("count-" + section);
    count.textContent = buckets[section].length;

    if (buckets[section].length === 0) {
      list.innerHTML = '<li class="empty-state">No tasks</li>';
      return;
    }

    list.innerHTML = buckets[section].map(task => {
      const isDone = getEffectiveSection(task, state) === "done";
      return '<li class="task-item' + (isDone ? ' completed' : '') + '">' +
        '<input type="checkbox" class="task-checkbox"' + (isDone ? ' checked' : '') +
        ' onchange="toggleTask(\'' + task.id + '\')">' +
        '<div class="task-text">' + escapeHtml(task.text) + '</div></li>';
    }).join("");
  });
}

function escapeHtml(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

render();
</script>
</body>
</html>
